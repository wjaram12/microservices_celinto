# Reverse proxy con TLS para el clasificador documental.
# Instalación paso a paso: deploy/README.md
#
# Reemplaza TU_DOMINIO por el dominio real (ej. clasificador.tudominio.com).
# Si solo tienes la IP (sin dominio), usa la variante autofirmada del README.

# --- HTTP: solo para la validación de certbot y redirigir a HTTPS ---
server {
    listen 80;
    server_name TU_DOMINIO;

    # Validación de Let's Encrypt (certbot).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Todo lo demás se redirige a HTTPS: las API keys nunca viajan en claro.
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: el servicio real ---
server {
    listen 443 ssl http2;
    server_name TU_DOMINIO;

    # certbot --nginx escribe y renueva estos certificados automáticamente.
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # El servicio acepta archivos de hasta 10 MB; margen para el multipart.
    client_max_body_size 12m;

    # Extend puede tardar hasta 5 minutos en clasificar/extraer: el proxy debe
    # esperar más que el timeout del cliente httpx (300 s) para no cortar antes.
    proxy_connect_timeout 10s;
    proxy_send_timeout    330s;
    proxy_read_timeout    330s;

    # Cabeceras de seguridad básicas.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        # gunicorn escucha SOLO en localhost (ver deploy/clasificador.service):
        # nadie llega al servicio sin pasar por este proxy.
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
