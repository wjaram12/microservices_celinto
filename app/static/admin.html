<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administración</title>
<style>
  :root { --azul: #1e5fa8; --gris: #f4f6f8; --borde: #d9dee3; --rojo: #c0392b; --verde: #1e8e4e; --naranja: #b9770e; }
  * { box-sizing: border-box; }
  body { font-family: "Segoe UI", system-ui, sans-serif; margin: 0; background: var(--gris); color: #222; }
  header { background: var(--azul); color: #fff; padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 1.25rem; }
  header p { margin: 4px 0 0; opacity: .85; font-size: .82rem; }
  header button { background: rgba(255,255,255,.18); color: #fff; border: 1px solid rgba(255,255,255,.4); }
  main { max-width: 980px; margin: 24px auto; padding: 0 16px; }
  .tarjeta { background: #fff; border: 1px solid var(--borde); border-radius: 8px; padding: 18px 20px; margin-bottom: 18px; }
  .tarjeta h2 { margin: 0 0 12px; font-size: 1.05rem; color: var(--azul); }
  .clase { border-left: 4px solid var(--azul); }
  .clase.inactivo { border-left-color: #aaa; opacity: .8; }
  .clase-cabecera { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .id { font-family: Consolas, monospace; background: #eef3f8; padding: 2px 8px; border-radius: 4px; font-size: .82rem; }
  label { display: block; font-size: .8rem; font-weight: 600; margin: 10px 0 4px; }
  input[type=text], input[type=password], textarea, select { width: 100%; padding: 9px 11px; border: 1px solid var(--borde); border-radius: 6px; font: inherit; background: #fff; }
  textarea { min-height: 110px; resize: vertical; }
  .fila { display: flex; gap: 14px; flex-wrap: wrap; }
  .fila > div { flex: 1; min-width: 180px; }
  button { font: inherit; border: 0; border-radius: 6px; padding: 9px 16px; cursor: pointer; }
  .btn-principal { background: var(--azul); color: #fff; }
  .btn-suave { background: #e8edf2; color: #222; }
  button:hover { filter: brightness(1.08); }
  .acciones { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
  .meta { font-size: .72rem; color: #888; margin-top: 8px; }
  .etiqueta { font-size: .72rem; font-weight: 700; padding: 2px 10px; border-radius: 10px; }
  .etiqueta.admin { background: #fdecea; color: var(--rojo); }
  .etiqueta.consumo { background: #e3edf9; color: var(--azul); }
  .etiqueta.activo { background: #e2f5e9; color: var(--verde); }
  .etiqueta.revocado { background: #eee; color: #777; }
  /* Pestañas */
  .tabs { display: flex; gap: 6px; margin-bottom: 18px; }
  .tab { background: #e8edf2; color: #444; }
  .tab.activa { background: var(--azul); color: #fff; }
  /* Pantalla de acceso */
  #acceso { max-width: 420px; margin: 8vh auto; }
  #acceso .tarjeta { text-align: center; }
  #acceso h2 { color: var(--azul); margin-top: 0; }
  #acceso p { font-size: .88rem; color: #555; }
  #acceso input { text-align: center; margin-top: 8px; }
  #acceso button { width: 100%; margin-top: 14px; }
  .oculto { display: none; }
  #mensaje { position: fixed; bottom: 20px; right: 20px; padding: 12px 18px; border-radius: 8px; color: #fff; display: none; max-width: 380px; box-shadow: 0 4px 14px rgba(0,0,0,.25); z-index: 10; }
  #mensaje.ok { background: var(--verde); display: block; }
  #mensaje.error { background: var(--rojo); display: block; }
  .aviso { background: #fff4e5; border: 1px solid #f0c27b; color: #8a5a00; border-radius: 8px; padding: 12px 16px; margin-bottom: 18px; font-size: .88rem; }
  /* Caja de clave recién creada */
  .clave-nueva { margin-top: 14px; background: #f0f8f2; border: 1px solid #9ed3b0; border-radius: 8px; padding: 14px 16px; }
  .clave-nueva .valor { font-family: Consolas, monospace; background: #fff; border: 1px solid var(--borde); border-radius: 6px; padding: 8px 10px; word-break: break-all; margin: 8px 0; }
  .clave-nueva .nota { font-size: .8rem; color: var(--naranja); }
</style>
</head>
<body>

<!-- Pantalla de acceso: pide la clave admin antes de mostrar nada -->
<div id="acceso">
  <div class="tarjeta">
    <h2>🔐 Administración</h2>
    <p>Introduce tu <b>API key de administrador</b> para gestionar prompts y claves.</p>
    <input type="password" id="clave-input" placeholder="wsk_..." autocomplete="off"
           onkeydown="if(event.key==='Enter') entrar()">
    <button class="btn-principal" onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- Panel de administración (oculto hasta validar la clave) -->
<div id="panel" class="oculto">
  <header>
    <div>
      <h1>⚙️ Panel de Administración</h1>
      <p>Gestión de los prompts del clasificador y de las API keys del servicio.</p>
    </div>
    <button onclick="salir()">Salir</button>
  </header>
  <main>
    <nav class="tabs">
      <button id="tab-prompts" class="tab activa" onclick="cambiarVista('prompts')">🗂️ Prompts</button>
      <button id="tab-keys" class="tab" onclick="cambiarVista('keys')">🔑 API Keys</button>
    </nav>

    <!-- Vista: Prompts -->
    <section id="vista-prompts">
      <div id="banner"></div>
      <div id="lista"></div>
    </section>

    <!-- Vista: API Keys -->
    <section id="vista-keys" class="oculto">
      <div class="tarjeta">
        <h2>➕ Nueva API key</h2>
        <div class="fila">
          <div>
            <label for="k-consumidor">Consumidor</label>
            <input type="text" id="k-consumidor" placeholder="ej: ucg-posgrados">
          </div>
          <div>
            <label for="k-scope">Scope</label>
            <select id="k-scope">
              <option value="consumo">consumo (clasificar / OCR)</option>
              <option value="admin">admin (además, gestionar)</option>
            </select>
          </div>
        </div>
        <div class="acciones">
          <button class="btn-principal" onclick="crearKey()">Crear clave</button>
        </div>
        <div id="k-nueva"></div>
      </div>
      <div id="lista-keys"></div>
    </section>
  </main>
</div>

<div id="mensaje"></div>

<script>
const API_PROMPTS = "/api/v1/prompts/clases/";
const API_KEYS = "/api/v1/api-keys/";
let clave = sessionStorage.getItem("admin_api_key") || "";

function avisar(texto, esError = false) {
  const caja = document.getElementById("mensaje");
  caja.textContent = texto;
  caja.className = esError ? "error" : "ok";
  setTimeout(() => { caja.className = ""; }, 4000);
}

function escapar(t) {
  const div = document.createElement("div");
  div.textContent = t ?? "";
  return div.innerHTML;
}

function mostrarPanel(mostrar) {
  document.getElementById("acceso").className = mostrar ? "oculto" : "";
  document.getElementById("panel").className = mostrar ? "" : "oculto";
}

function salir() {
  sessionStorage.removeItem("admin_api_key");
  clave = "";
  document.getElementById("clave-input").value = "";
  document.getElementById("lista").innerHTML = "";
  document.getElementById("lista-keys").innerHTML = "";
  document.getElementById("banner").innerHTML = "";
  document.getElementById("k-nueva").innerHTML = "";
  mostrarPanel(false);
}

async function llamar(url, opciones = {}) {
  const r = await fetch(url, {
    headers: { "Content-Type": "application/json", "X-API-Key": clave },
    ...opciones,
  });
  const cuerpo = r.status === 204 ? null : await r.json().catch(() => ({}));
  return { status: r.status, ok: r.ok, cuerpo };
}

// Si una llamada devuelve 401/403, la sesión ya no sirve: volver al acceso.
function sesionInvalida(status) {
  if (status === 401 || status === 403) {
    salir();
    avisar("Sesión no válida o sin permisos de administrador.", true);
    return true;
  }
  return false;
}

function cambiarVista(nombre) {
  const esPrompts = nombre === "prompts";
  document.getElementById("vista-prompts").className = esPrompts ? "" : "oculto";
  document.getElementById("vista-keys").className = esPrompts ? "oculto" : "";
  document.getElementById("tab-prompts").className = esPrompts ? "tab activa" : "tab";
  document.getElementById("tab-keys").className = esPrompts ? "tab" : "tab activa";
  if (esPrompts) recargarPrompts(); else cargarKeys();
}

// ---------- Acceso ----------
async function entrar() {
  const valor = document.getElementById("clave-input").value.trim();
  if (!valor) { avisar("Introduce la clave de administrador.", true); return; }
  clave = valor;
  // Se valida la clave contra el CRUD de API keys: solo responde a scope admin
  // y no depende de Document AI (así entra aunque el clasificador falle).
  const { status, ok } = await llamar(API_KEYS);
  if (ok) {
    sessionStorage.setItem("admin_api_key", clave);
    mostrarPanel(true);
    cambiarVista("prompts");
  } else if (status === 401 || status === 403) {
    clave = "";
    avisar("Clave inválida o sin permisos de administrador.", true);
  } else {
    avisar(`Error inesperado (HTTP ${status}).`, true);
  }
}

// ---------- Prompts ----------
async function recargarPrompts() {
  const { status, ok, cuerpo } = await llamar(API_PROMPTS);
  if (ok) { renderizarPrompts(cuerpo, ""); return; }
  if (sesionInvalida(status)) return;
  renderizarPrompts([], (cuerpo && cuerpo.detail) || `No se pudieron cargar las clases (HTTP ${status}).`);
}

function renderizarPrompts(clases, errorBanner) {
  document.getElementById("banner").innerHTML = errorBanner
    ? `<div class="aviso">⚠️ ${escapar(errorBanner)}</div>` : "";
  const lista = document.getElementById("lista");
  if (!clases.length) {
    lista.innerHTML = errorBanner ? "" : '<div class="tarjeta">El procesador no tiene clases definidas.</div>';
    return;
  }
  lista.innerHTML = clases.map(c => `
    <div class="tarjeta clase">
      <div class="clase-cabecera"><span class="id">${escapar(c.name)}</span></div>
      <label>Etiqueta (display_name)</label>
      <input type="text" id="dn-${escapar(c.name)}" value="${escapar(c.display_name)}">
      <label>Prompt (description)</label>
      <textarea id="desc-${escapar(c.name)}">${escapar(c.description)}</textarea>
      <div class="acciones">
        <button class="btn-principal" onclick="guardarPrompt('${escapar(c.name)}')">💾 Guardar cambios</button>
      </div>
    </div>
  `).join("");
}

async function guardarPrompt(name) {
  const display_name = document.getElementById(`dn-${name}`).value.trim();
  const description = document.getElementById(`desc-${name}`).value.trim();
  const { status, ok, cuerpo } = await llamar(API_PROMPTS + encodeURIComponent(name), {
    method: "PUT", body: JSON.stringify({ display_name, description }),
  });
  if (ok) { avisar(`Clase '${name}' actualizada.`); return; }
  if (sesionInvalida(status)) return;
  avisar((cuerpo && cuerpo.detail) || `No se pudo guardar (HTTP ${status}).`, true);
}

// ---------- API Keys ----------
async function cargarKeys() {
  const { status, ok, cuerpo } = await llamar(API_KEYS);
  if (ok) { renderizarKeys(cuerpo); return; }
  if (sesionInvalida(status)) return;
  avisar((cuerpo && cuerpo.detail) || `No se pudieron cargar las claves (HTTP ${status}).`, true);
}

function opcionScope(actual) {
  return ["consumo", "admin"].map(s =>
    `<option value="${s}" ${s === actual ? "selected" : ""}>${s}</option>`).join("");
}

function renderizarKeys(keys) {
  const lista = document.getElementById("lista-keys");
  if (!keys.length) { lista.innerHTML = '<div class="tarjeta">No hay API keys registradas.</div>'; return; }
  lista.innerHTML = keys.map(k => `
    <div class="tarjeta clase ${k.activo ? "" : "inactivo"}">
      <div class="clase-cabecera">
        <span class="id">#${k.id} · ${escapar(k.consumidor)}</span>
        <span>
          <span class="etiqueta ${k.scope === "admin" ? "admin" : "consumo"}">${escapar(k.scope)}</span>
          <span class="etiqueta ${k.activo ? "activo" : "revocado"}">${k.activo ? "ACTIVO" : "REVOCADO"}</span>
        </span>
      </div>
      <div class="fila">
        <div>
          <label>Consumidor</label>
          <input type="text" id="kc-${k.id}" value="${escapar(k.consumidor)}">
        </div>
        <div>
          <label>Scope</label>
          <select id="ks-${k.id}">${opcionScope(k.scope)}</select>
        </div>
      </div>
      <div class="meta">Creada: ${escapar(k.creado_en)} · Último uso: ${escapar(k.ultimo_uso || "—")}</div>
      <div class="acciones">
        <button class="btn-principal" onclick="guardarKey(${k.id})">💾 Guardar</button>
        <button class="btn-suave" onclick="alternarKey(${k.id}, ${k.activo ? "false" : "true"})">
          ${k.activo ? "⏸️ Revocar" : "▶️ Reactivar"}
        </button>
      </div>
    </div>
  `).join("");
}

async function crearKey() {
  const consumidor = document.getElementById("k-consumidor").value.trim();
  const scope = document.getElementById("k-scope").value;
  if (!consumidor) { avisar("Indica el nombre del consumidor.", true); return; }
  const { status, ok, cuerpo } = await llamar(API_KEYS, {
    method: "POST", body: JSON.stringify({ consumidor, scope }),
  });
  if (ok) {
    document.getElementById("k-consumidor").value = "";
    // La clave en texto plano se muestra UNA sola vez.
    document.getElementById("k-nueva").innerHTML = `
      <div class="clave-nueva">
        <div>✅ Clave creada para <b>${escapar(cuerpo.consumidor)}</b> (scope ${escapar(cuerpo.scope)}).</div>
        <div class="valor" id="valor-nueva">${escapar(cuerpo.llave)}</div>
        <button class="btn-suave" onclick="copiar('${escapar(cuerpo.llave)}')">📋 Copiar</button>
        <div class="nota">⚠️ Cópiala ahora: no se volverá a mostrar.</div>
      </div>`;
    cargarKeys();
    return;
  }
  if (sesionInvalida(status)) return;
  avisar((cuerpo && cuerpo.detail) || `No se pudo crear la clave (HTTP ${status}).`, true);
}

async function guardarKey(id) {
  const consumidor = document.getElementById(`kc-${id}`).value.trim();
  const scope = document.getElementById(`ks-${id}`).value;
  const { status, ok, cuerpo } = await llamar(API_KEYS + id, {
    method: "PUT", body: JSON.stringify({ consumidor, scope }),
  });
  if (ok) { avisar(`Clave #${id} actualizada.`); cargarKeys(); return; }
  if (sesionInvalida(status)) return;
  avisar((cuerpo && cuerpo.detail) || `No se pudo guardar (HTTP ${status}).`, true);
}

async function alternarKey(id, activar) {
  const { status, ok, cuerpo } = await llamar(API_KEYS + id, {
    method: "PUT", body: JSON.stringify({ activo: activar === true || activar === "true" }),
  });
  if (ok) { avisar(`Clave #${id} ${ok && (activar === true || activar === "true") ? "reactivada" : "revocada"}.`); cargarKeys(); return; }
  if (sesionInvalida(status)) return;
  avisar((cuerpo && cuerpo.detail) || `No se pudo cambiar el estado (HTTP ${status}).`, true);
}

function copiar(texto) {
  navigator.clipboard.writeText(texto).then(
    () => avisar("Clave copiada al portapapeles."),
    () => avisar("No se pudo copiar; selecciónala manualmente.", true),
  );
}

// Si ya había una clave en sessionStorage (recarga de página), entra directo.
if (clave) {
  document.getElementById("clave-input").value = clave;
  entrar();
}
</script>
</body>
</html>
